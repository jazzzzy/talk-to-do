name: Deploy to Firebase on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Frontend Build ──────────────────────────────────────
      - name: Install Frontend Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── Cloud Functions Build ───────────────────────────────
      - name: Install Functions Dependencies
        run: npm ci
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      # ── Deploy ──────────────────────────────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TASKFLOW_PWA }}'
          channelId: live
          projectId: todo-list-e9124

      - name: Deploy Cloud Functions & Firestore Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TASKFLOW_PWA }}' > $RUNNER_TEMP/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa_key.json
          npx firebase-tools deploy --only functions,firestore:rules --project todo-list-e9124 --force
